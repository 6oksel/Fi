<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" id="ati" sizes="180x180" href=""/>
<link rel="icon" id="favi" type="image/png" href=""/>
<title>FitApp</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Nunito',sans-serif;background:#f2f2f2;color:#1a1a1a;min-height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative;background:#f2f2f2;overflow:hidden}
@media(min-width:768px){body{background:#aaa;display:flex;align-items:center;justify-content:center}#app{height:calc(100dvh - 40px);max-height:900px;border-radius:32px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.3)}}
/* HEADER */
.app-header{display:flex;align-items:center;gap:10px;background:#fff;padding:10px 14px;flex-shrink:0;border-bottom:1px solid #f0f0f0}
.hlogo{width:40px;height:40px;flex-shrink:0;border-radius:9px;overflow:hidden}
.hlogo svg{width:40px;height:40px;display:block}
.hname{font-size:14px;font-weight:800;color:#1a1a1a;flex:1}
.hstats{display:flex;gap:14px;flex-shrink:0;align-items:center}
.hstat{text-align:center;line-height:1}
.hstat-val{font-size:16px;font-weight:900;color:#1a1a1a}
.hstat-lbl{font-size:9px;color:#bbb;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.hsbtn{background:none;border:none;cursor:pointer;color:#bbb;padding:4px;display:flex}
.hpbar{height:3px;background:#f0f0f0;flex-shrink:0}
.hpbar-fill{height:100%;background:linear-gradient(90deg,#c8f500,#aadd00);border-radius:0 2px 2px 0;transition:width .6s ease;min-width:0}
/* NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:68px;display:flex;align-items:flex-start;background:#fff;border-top:1px solid #f0f0f0;z-index:20;padding:8px 4px 0;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 2px}
.niw{width:40px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:100px;transition:background .2s}
.nav-btn.active .niw{background:#c8f500;box-shadow:0 3px 10px rgba(200,245,0,.5)}
.ni{font-size:17px;line-height:1}
.nl{font-size:10px;font-weight:700;letter-spacing:.03em;color:#bbb}
.nav-btn.active .nl{color:#7aaa00}
/* PAGES */
.page-container{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;opacity:0;pointer-events:none;transform:translateY(5px);transition:opacity .2s ease,transform .2s ease;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:calc(10px + 68px)}
.page::-webkit-scrollbar{display:none}
.page.active{opacity:1;pointer-events:all;transform:translateY(0)}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.mov.hidden{display:none}
.mb{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom,0));box-shadow:0 -8px 40px rgba(0,0,0,.15);animation:sU .22s cubic-bezier(.4,0,.2,1);scrollbar-width:none}
.mb::-webkit-scrollbar{display:none}
@keyframes sU{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{width:32px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 14px;display:block}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mt{font-size:19px;font-weight:900}
/* DIALOG */
.dov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.db{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:300px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.dbt{font-size:17px;font-weight:900;margin-bottom:6px}
.dbm{font-size:13px;color:#aaa;line-height:1.6;margin-bottom:16px}
.dbb{display:flex;gap:10px}.dbb .btn{flex:1}
/* FORMS */
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:800;color:#aaa;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.fi,.fs,.fta{width:100%;padding:11px 13px;background:#f8f8f8;border:1.5px solid #e8e8e8;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:#1a1a1a;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fi:focus,.fs:focus,.fta:focus{border-color:#aadd00}
.fta{resize:vertical;min-height:80px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:100px;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:transform .15s,opacity .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.96);opacity:.88}
.bl{background:linear-gradient(135deg,#c8f500,#aadd00);color:#1a1a1a;box-shadow:0 4px 14px rgba(200,245,0,.4)}
.bo{background:transparent;color:#1a1a1a;border:1.5px solid #e0e0e0}
.bd{background:#ff4d4d;color:#fff}
.bsm{padding:6px 13px;font-size:12px}
.bf{width:100%;border-radius:10px}
.ib{background:#f4f4f4;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:#1a1a1a;flex-shrink:0}
.ibox{background:rgba(200,245,0,.1);border:1px solid #aadd00;border-radius:10px;padding:11px;font-size:13px;color:#7aaa00;line-height:1.6;margin-bottom:11px}
/* BADGE */
.badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:800}
.blime{background:rgba(200,245,0,.15);color:#7aaa00;border:1px solid #aadd00}
.bgreen{background:rgba(92,184,0,.12);color:#5cb800}
.bred{background:rgba(255,77,77,.12);color:#ff4d4d}
.bblue{background:rgba(74,158,224,.12);color:#4a9ee0}
.bgray{background:#f0f0f0;color:#aaa}
.bpurp{background:rgba(139,92,246,.12);color:#8b5cf6}
/* SETTINGS - with proper padding */
.page-inner{padding:0 16px}
.ss{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#bbb;margin:16px 16px 8px}
.si{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.si:last-child{border-bottom:none}
.sil{display:flex;align-items:center;gap:10px}
.sic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.slbl{font-size:14px;font-weight:700}
.sdesc{font-size:11px;color:#bbb}
.tog{width:44px;height:24px;background:#e0e0e0;border-radius:100px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;padding:0}
.tog.on{background:#aadd00}
.tog::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on::after{transform:translateX(20px)}
/* DRAG */
.drit{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:11px 12px;margin-bottom:7px;box-shadow:0 2px 8px rgba(0,0,0,.06);touch-action:none;user-select:none}
.drit.dragging{box-shadow:0 8px 24px rgba(0,0,0,.12);opacity:.9;transform:scale(1.02)}
.drh{color:#ccc;font-size:16px;flex-shrink:0}
/* HIST */
.hcard{background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:7px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between}
/* EX */
.exc{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.spill{background:#f4f4f4;border-radius:8px;padding:7px 5px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .18s;line-height:1.3}
.spill.done{background:rgba(200,245,0,.15);color:#7aaa00;border-color:#aadd00}
/* RECIPE */
.rc{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;transition:transform .18s}
.rc:active{transform:scale(.98)}
/* SHOP */
.shi{display:flex;align-items:center;gap:11px;background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:7px;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:opacity .2s}
.shi.checked{opacity:.4}
.shi.checked .shn{text-decoration:line-through}
.shck{width:22px;height:22px;border-radius:50%;border:2.5px solid #e0e0e0;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.shck.checked{background:#aadd00;border-color:#aadd00;font-size:12px}
/* MISC */
.finh{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;left:0;top:0}
.fslot{cursor:pointer}
.es{text-align:center;padding:36px 20px;color:#bbb}
.ei{font-size:44px;margin-bottom:10px}
.ett{font-size:17px;font-weight:900;color:#1a1a1a;margin-bottom:6px}
.ed{font-size:13px;line-height:1.6}
.tdisp{font-size:50px;font-weight:900;letter-spacing:-2px;text-align:center;line-height:1}
.tpresets{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.tpb{background:rgba(200,245,0,.15);border:1.5px solid #aadd00;border-radius:100px;padding:5px 11px;font-size:12px;font-weight:800;cursor:pointer;color:#7aaa00;font-family:'Nunito',sans-serif}
.mrow{cursor:pointer}
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:10px}
.st{font-size:14px;font-weight:800;color:#1a1a1a;margin-bottom:8px}
.tm{color:#aaa;font-size:12px}
.mbb{background:#ebebeb;border-radius:100px;height:6px;overflow:hidden}
.mbf{height:100%;border-radius:100px;transition:width .5s ease}
.flex{display:flex}.fb{display:flex;justify-content:space-between;align-items:center}
.g8{gap:8px}.mt8{margin-top:8px}.mt12{margin-top:12px}

</style>

<script>
(function(){
  // Generate app icon as PNG via Canvas - works in iOS Safari PWA
  var c=document.createElement('canvas');
  c.width=180;c.height=180;
  var ctx=c.getContext('2d');
  // Rounded rect background
  var r=42;
  ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(180-r,0);
  ctx.quadraticCurveTo(180,0,180,r);
  ctx.lineTo(180,180-r);
  ctx.quadraticCurveTo(180,180,180-r,180);
  ctx.lineTo(r,180);
  ctx.quadraticCurveTo(0,180,0,180-r);
  ctx.lineTo(0,r);
  ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  // Gradient fill
  var grd=ctx.createLinearGradient(0,0,180,180);
  grd.addColorStop(0,'#fdf60f');
  grd.addColorStop(1,'#9bf904');
  ctx.fillStyle=grd;
  ctx.fill();
  // Draw M/lightning bolt shape (simplified polygon)
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();
  // Scale the SVG polygon points from 1170x1080 to 180x180
  var sx=180/1170, sy=180/1080;
  var pts=[[866.51,428.94],[805.82,368.25],[657.16,368.25],[617.16,408.25],[577.16,368.25],[428.51,368.25],[355.04,441.71],[355.04,711.75],[583.7,483.1],[583.7,711.75]];
  ctx.moveTo(pts[0][0]*sx, pts[0][1]*sy);
  for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i][0]*sx, pts[i][1]*sy);
  ctx.closePath();
  ctx.fill();
  // Set as apple-touch-icon
  var png=c.toDataURL('image/png');
  var ati=document.getElementById('ati');
  var favi=document.getElementById('favi');
  if(ati)ati.href=png;
  if(favi)favi.href=png;
})();
</script>

<script>
'use strict';
/* ===== DIALOG ===== */
const D=(() => {
  function show({title='',msg='',input=false,ph='',def='',buttons=[{label:'Tamam',value:true,s:'bl'}]}){
    return new Promise(res=>{
      document.getElementById('dTitle').textContent=title;
      document.getElementById('dMsg').textContent=msg;
      const inp=document.getElementById('dInp');
      if(input){inp.style.display='block';inp.placeholder=ph;inp.value=def;}
      else inp.style.display='none';
      const btns=document.getElementById('dBtns');btns.innerHTML='';
      buttons.forEach(b=>{
        const btn=document.createElement('button');
        btn.className='btn '+(b.s||'bo');btn.textContent=b.label;
        btn.onclick=()=>{document.getElementById('dov').style.display='none';res(input?b.value?inp.value.trim():null:b.value);};
        btns.appendChild(btn);
      });
      document.getElementById('dov').style.display='flex';
      if(input)setTimeout(()=>inp.focus(),100);
    });
  }
  const confirm=(msg,t='Emin misin?')=>show({title:t,msg,buttons:[{label:'İptal',value:false,s:'bo'},{label:'Evet',value:true,s:'bd'}]});
  const alert=(msg,t='Bilgi')=>show({title:t,msg,buttons:[{label:'Tamam',value:true,s:'bl'}]});
  const prompt=(msg,ph='',def='',t='')=>show({title:t||msg,msg:t?msg:'',input:true,ph,def,buttons:[{label:'İptal',value:false,s:'bo'},{label:'Tamam',value:true,s:'bl'}]});
  return{confirm,alert,prompt};
})();

  const DEF={
    macros:{kalori:2200,protein:160,karbonhidrat:250,yag:65,lif:30,vitamin_c:90,demir:18,kalsiyum:1000,magnezyum:400},
    profil:{ad:'',kilo:'',boy:'',yas:'',cinsiyet:'Erkek',aktivite:'1.55',hedef:'koruma',proteinOrani:'2.0',yagOrani:'0.9',manuelMod:false},
    olcumler:{gogus:'',bel:'',kalca:'',biceps_sag:'',biceps_sol:'',uyluk_sag:'',uyluk_sol:'',omuz:'',boyun:'',bacak:''},
    olcumGecmisi:[],egzersizler:[],tarifler:[],alisveris:[],ogunGecmisi:{},
    foto:{ilk:null,son:null},su:{hedef:8,gecmis:{}},uyku:[],
    fastingState:{active:false,startTime:null,targetHours:16},
    settings:{theme:'light',goster:{oruc:true,su:true,mikro:true,uyku:true,analiz:true,foto:true},
      dashboardSira:['kcal','oruc','su','uyku','mikro','analiz','foto']}
  };
  function load(){try{const r=localStorage.getItem(KEY);if(!r)return JSON.parse(JSON.stringify(DEF));return dm(JSON.parse(JSON.stringify(DEF)),JSON.parse(r));}catch{return JSON.parse(JSON.stringify(DEF));}}
  function dm(t,s){for(const k in s){if(s[k]&&typeof s[k]==='object'&&!Array.isArray(s[k])){if(!t[k])t[k]={};dm(t[k],s[k]);}else t[k]=s[k];}return t;}
  function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch{const d2={...d,foto:{ilk:null,son:null},tarifler:(d.tarifler||[]).map(t=>({...t,foto:null}))};try{localStorage.setItem(KEY,JSON.stringify(d2));}catch{}}}
  function exportJ(d){const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='fitapp_yedek_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},300);}
  function importJ(file,cb){const r=new FileReader();r.onload=e=>{try{cb(null,JSON.parse(e.target.result));}catch{cb(new Error('Geçersiz dosya'));}};r.readAsText(file);}
  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
  function today(){return new Date().toISOString().slice(0,10);}
  function pd(v){if(!v)return'';if(/^\d{4}-\d{2}-\d{2}$/.test(v)){const[y,m,dd]=v.split('-').map(Number);return new Date(y,m-1,dd).toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});}return String(v);}
  return{load,save,exportJ,importJ,uid,today,pd};
})();


/* ===== CALC ===== */
const C=(() => {
  const aL={'1.2':'Masa Başı','1.375':'Hafif Aktif','1.55':'Orta Aktif','1.725':'Çok Aktif','1.9':'Ekstra Aktif'};
  const hL={'vermek500':'Kilo Ver (-500)','vermek300':'Kilo Ver (-300)','koruma':'Koru (TDEE)','almak300':'Kilo Al (+300)','almak500':'Kilo Al (+500)'};
  function bmr(k,b,y,c){if(!k||!b||!y)return null;return c==='Erkek'?Math.round(10*+k+6.25*+b-5*+y+5):Math.round(10*+k+6.25*+b-5*+y-161);}
  function hesapla(p){const b=bmr(p.kilo,p.boy,p.yas,p.cinsiyet);if(!b)return null;const t=Math.round(b*(+(p.aktivite||'1.55')));const hm={vermek500:-500,vermek300:-300,koruma:0,almak300:300,almak500:500};const kcal=t+(hm[p.hedef||'koruma']||0);const pr=Math.round((+p.kilo)*(+(p.proteinOrani||'2.0')));const ya=Math.round((+p.kilo)*(+(p.yagOrani||'0.9')));const ka=Math.max(0,Math.round((kcal-(pr*4)-(ya*9))/4));const e=p.cinsiyet==='Erkek';return{bmr:b,tdee:t,kalori:kcal,protein:pr,yag:ya,karbonhidrat:ka,lif:e?38:25,vitamin_c:e?90:75,demir:e?8:18,kalsiyum:1000,magnezyum:e?420:320};}
  function ogt(og){const t={kalori:0,protein:0,karbonhidrat:0,yag:0,lif:0,vitamin_c:0,demir:0,kalsiyum:0,magnezyum:0};(og||[]).forEach(o=>Object.keys(t).forEach(k=>{t[k]+=+(o[k]||0);}));return t;}
  function rc(key){const dk=document.documentElement.getAttribute('data-theme')==='dark';const m={blue:dk?'#4a9ee0':'#1a6fb5',green:dk?'#5cb800':'#2d8a4e',yellow:dk?'#f0a830':'#c47d00',red:dk?'#ff6b6b':'#e53935',purple:dk?'#a78bfa':'#7c3aed',lime:'#7aaa00'};return m[key]||m.lime;}
  function vag(p,o){
    const{kilo,boy,cinsiyet}=p;const{bel,boyun,kalca,gogus,bacak,omuz}=o;
    if(!kilo||!boy||!bel||!boyun)return null;
    const h=+boy,w=+kilo,wa=+bel,ne=+boyun,hi=+(kalca||0),ch=+(gogus||0),th=+(bacak||0),sh=+(omuz||0);
    const K=cinsiyet==='Erkek'?1:0;if(K===0&&!hi)return null;
    const l=x=>Math.log(x)/Math.log(10);const bmi=w/Math.pow(h/100,2);
    let N=K===1?86.010*l(wa-ne)-70.041*l(h)+36.76:163.205*l(wa+hi-ne)-97.684*l(h)-78.387;
    const Dv=(25*wa/h)-(15*ne/h)-(10*sh/h)+(8*(1-K)*hi/h)-(6*ch/h)+(4*th/h);
    let fat=Math.max(3,Math.min(60,(0.6*N)+(0.25*(1.20*bmi-10.8*K-5.4))+(0.15*Dv)));
    const bb=wa/h;
    let tip,ta,tr;
    if(K===1){if(bmi<20&&fat<12){tip='Ektomorf';ta='İnce yapı, düşük yağ.';tr=rc('blue');}else if(bmi>=19&&bmi<=25&&fat>=10&&fat<=20){tip='Mezomorf';ta='Atletik yapı, dengeli oran.';tr=rc('green');}else{tip='Endomorf';ta='Yağ depolama eğilimi yüksek.';tr=rc('yellow');}}
    else{if(bmi<19&&fat<18){tip='Ektomorf';ta='İnce yapı.';tr=rc('blue');}else if(bmi>=19&&bmi<=24&&fat>=18&&fat<=28){tip='Mezomorf';ta='Atletik yapı.';tr=rc('green');}else{tip='Endomorf';ta='Yağ eğilimi yüksek.';tr=rc('yellow');}}
    const arl=K===1?{alt:8,ia:10,iu:20,ust:25}:{alt:14,ia:18,iu:28,ust:35};
    let sd,sr;if(fat<=arl.alt){sd='Çok Düşük';sr=rc('blue');}else if(fat<=arl.iu){sd='Sağlıklı ✓';sr=rc('green');}else if(fat<=arl.ust){sd='Yüksek';sr=rc('yellow');}else{sd='Çok Yüksek';sr=rc('red');}
    let bk,br;if(bmi<18.5){bk='Zayıf';br=rc('blue');}else if(bmi<25){bk='Normal ✓';br=rc('green');}else if(bmi<30){bk='Fazla Kilolu';br=rc('yellow');}else{bk='Obez';br=rc('red');}
    let bbk,bbr;if(bb<0.4){bbk='Çok İnce';bbr=rc('blue');}else if(bb<0.5){bbk='Sağlıklı ✓';bbr=rc('green');}else if(bb<0.6){bbk='Risk Altında';bbr=rc('yellow');}else{bbk='Yüksek Risk';bbr=rc('red');}
    return{fat:+fat.toFixed(1),bmi:+bmi.toFixed(1),belBoy:+bb.toFixed(3),tip,tipAciklama:ta,tipRenk:tr,saglikDurum:sd,saglikRenk:sr,bmiKat:bk,bmiRenk:br,bbKat:bbk,bbRenk:bbr,arl,K};
  }
  return{hesapla,aLabels:aL,hLabels:hL,ogt,vag};
})();

  function getDates(){
    var d=new Date(sel),res=[];

    }

  }

  function drawRing(container,pct,label,bigNum,subLabel,color){
    color=color||'#c8f500';
    var sz=130,sw=13,R=sz/2-sw-2;
    var total=2*Math.PI*R;
    var filled=(Math.min(pct,100)/100)*total;
    var off=total-filled;
    var svg='<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'" style="transform:rotate(-90deg)">'+
      '<circle fill="none" stroke="#ebebeb" cx="'+(sz/2)+'" cy="'+(sz/2)+'" r="'+R+'" stroke-width="'+sw+'"/>'+
      '<circle fill="none" stroke="'+color+'" cx="'+(sz/2)+'" cy="'+(sz/2)+'" r="'+R+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+total+'" stroke-dashoffset="'+off+'" style="transition:stroke-dashoffset .8s ease"/>'+
      '</svg>';
    var inner='<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">'+
      '<div style="font-size:11px;color:#aaa;font-weight:600">'+label+'</div>'+
      '<div style="font-size:28px;font-weight:900;line-height:1;color:#1a1a1a">'+bigNum+'</div>'+
      '<div style="font-size:11px;color:#aaa;font-weight:600">'+subLabel+'</div>'+
      '</div>';
    container.style.cssText='position:relative;width:'+sz+'px;height:'+sz+'px;flex-shrink:0';
    container.innerHTML=svg+inner;
  }

  function drawMacroBar(wrap,name,color,val,hedef){
    var pct=hedef?Math.min(Math.round((val/hedef)*100),100):0;
    var over=val>hedef;
    var c=over?'#ff4d4d':color;
    wrap.innerHTML=
      '<div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
        '<span style="font-size:12px;color:#666;font-weight:600">'+name+'</span>'+
        '<span style="font-size:12px;font-weight:800;color:'+c+'">'+val+'/'+hedef+'</span>'+
      '</div>'+
      '<div style="background:#ebebeb;border-radius:100px;height:6px;overflow:hidden">'+
        '<div style="height:100%;width:'+pct+'%;background:'+c+';border-radius:100px;transition:width .5s ease"></div>'+

    var ogunler=(data.ogunGecmisi||{})[sel]||[];

    var calc=C.hesapla(p);
    var isManuel=p.manuelMod||false;
    var an=C.vag(p,data.olcumler||{});
    var su=data.su||{hedef:8,gecmis:{}};
    var suCur=(su.gecmis||{})[sel]||0;
    var suHd=su.hedef||8;
    var foto=data.foto||{};
    var uyku=data.uyku||[];

    // Build HTML using DOM methods to avoid template literal issues
    el.innerHTML='';

    // 1. DATE STRIP
    var dateDiv=document.createElement('div');
    dateDiv.style.cssText='background:#fff;border-bottom:1px solid #f0f0f0;margin-bottom:1px';
    var dateNav=document.createElement('div');
    dateNav.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px';

    btnL.style.cssText='background:none;border:none;cursor:pointer;color:#bbb;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:14px';
    var dateSpan=document.createElement('span');

    dateSpan.textContent=sel===S.today()?'Bugün':S.pd(sel).split(' ').slice(0,2).join(' ');
    var btnR=document.createElement('button');
    btnR.id='nDay';btnR.textContent='▶';
    btnR.style.cssText='background:none;border:none;cursor:pointer;color:#bbb;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:14px';
    dateNav.appendChild(btnL);dateNav.appendChild(dateSpan);dateNav.appendChild(btnR);
    var dateStrip=document.createElement('div');

      else if(key==='analiz' && g.analiz!==false){el.appendChild(buildAnaliz(p,data.olcumler||{},an,calc));}
      else if(key==='foto' && g.foto!==false) el.appendChild(buildFoto(foto));
    });

    // 3. MEALS BOTTOM
    el.appendChild(buildMeals(m,ogunler));

    // EVENTS
    el.querySelector('#pDay').onclick=function(){var d=new Date(sel);d.setDate(d.getDate()-1);sel=d.toISOString().slice(0,10);render(data);};
    el.querySelector('#nDay').onclick=function(){var d=new Date(sel);d.setDate(d.getDate()+1);var t=new Date(S.today());if(d<=t){sel=d.toISOString().slice(0,10);render(data);}};
    el.querySelectorAll('.dcell').forEach(function(dc){dc.onclick=function(){sel=dc.dataset.date;render(data);};});

    var macBtn=el.querySelector('#macTogBtn');
    if(macBtn)macBtn.onclick=function(){
      data.profil.manuelMod=!isManuel;
      if(!data.profil.manuelMod){var c2=C.hesapla(data.profil);if(c2)['kalori','protein','karbonhidrat','yag','lif','vitamin_c','demir','kalsiyum','magnezyum'].forEach(function(k){data.macros[k]=c2[k];});}
      S.save(data);render(data);
    };

    var amBtn=el.querySelector('#amBtn');
    if(amBtn)amBtn.onclick=function(){oChoice(data,sel,null,function(){render(data);});};

    el.querySelectorAll('.mrow[data-bolum]').forEach(function(r){

    });

    el.querySelectorAll('.del-og-btn').forEach(function(b){

      fastInt=setInterval(function(){
        var f=data.fastingState;

        var p2=function(n){return String(Math.floor(n)).padStart(2,'0');};

        var rv=document.getElementById('fastRingVal');

  function buildKcal(m,p,yn,calc,isManuel,ogunler){

      ogunler.forEach(function(og,i){

        var info=document.createElement('div');info.style.cssText='flex:1';

      var tot=ogunler.filter(function(o){return o.bolum===b.k;}).reduce(function(s,o){return s+(+(o.kalori||0));},0);
      var hd=b.k==='kahvalti'?Math.round((m.kalori||2200)*.2):b.k==='ogle'||b.k==='aksam'?Math.round((m.kalori||2200)*.35):Math.round((m.kalori||2200)*.1);
      var row=document.createElement('div');
      row.className='mrow';row.dataset.bolum=b.k;
      row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.08);cursor:pointer';
      var nameEl=document.createElement('span');nameEl.style.cssText='font-size:14px;font-weight:800;color:#1a1a1a';nameEl.textContent=b.l;
      var kcalEl=document.createElement('span');kcalEl.style.cssText='font-size:13px;font-weight:700;color:rgba(0,0,0,.45)';kcalEl.textContent=tot+'/'+hd+' Kcal';
      row.appendChild(nameEl);row.appendChild(kcalEl);
      wrap.appendChild(row);
    });
    var spacer=document.createElement('div');spacer.style.height='10px';wrap.appendChild(spacer);
    return wrap;
  }

  /* ===== MODALS ===== */

  function setupFoto(el,data,cb){
    var fi=document.getElementById('fotoInput');var ft=null;
    function trig(t){ft=t;fi.value='';try{fi.click();}catch(e){}}
    var fsi=el.querySelector('#fsi');if(fsi)fsi.addEventListener('click',function(e){if(e.target.id==='fdi')return;trig('ilk');});
    var fss=el.querySelector('#fss');if(fss)fss.addEventListener('click',function(e){if(e.target.id==='fds')return;trig('son');});
    var fdi=el.querySelector('#fdi');if(fdi)fdi.addEventListener('click',function(e){e.stopPropagation();D.confirm('İlk hal fotoğrafı silinsin mi?').then(function(ok){if(ok){data.foto.ilk=null;S.save(data);cb();}});});
    var fds=el.querySelector('#fds');if(fds)fds.addEventListener('click',function(e){e.stopPropagation();D.confirm('Son hal fotoğrafı silinsin mi?').then(function(ok){if(ok){data.foto.son=null;S.save(data);cb();}});});
    fi.onchange=null;
    fi.addEventListener('change',function h(e){
      var f=e.target.files&&e.target.files[0];if(!f||!ft){fi.value='';return;}
      if(f.size>3*1024*1024){D.alert('Fotoğraf çok büyük (maks 3MB).');fi.value='';return;}
      var r=new FileReader();
      r.onload=function(ev){if(!data.foto)data.foto={};data.foto[ft]=ev.target.result;S.save(data);ft=null;fi.value='';cb();};
      r.onerror=function(){D.alert('Fotoğraf yüklenemedi.');fi.value='';};
      r.readAsDataURL(f);fi.removeEventListener('change',h);
    });
  }

  function oChoice(data,date,bolum,cb){
    M.open('Öğün Ekle','<div style="display:flex;flex-direction:column;gap:12px"><button class="btn bl bf" id="oc1" style="padding:16px;font-size:16px;border-radius:12px">🍽️ Tariften Seç</button><button class="btn bo bf" id="oc2" style="padding:16px;font-size:16px;border-radius:12px">✏️ Yeni Öğün Gir</button></div>');

      tr.map(function(t){return'<div class="rc" style="margin-bottom:8px;padding:12px" data-id="'+t.id+'">'+(t.foto?'<img src="'+t.foto+'" style="width:100%;height:80px;object-fit:cover;border-radius:10px;margin-bottom:8px"/>' :'')+
        '<div style="font-size:14px;font-weight:800">'+t.ad+'</div>'+
        '<div style="font-size:12px;color:#aaa;margin-top:4px">'+(t.kalori?'🔥 '+t.kalori+' kcal':'')+(t.protein?' · P:'+t.protein+'g':'')+(t.karbonhidrat?' · K:'+t.karbonhidrat+'g':'')+(t.yag?' · Y:'+t.yag+'g':'')+'</div></div>';}).join('');

  function oManuel(data,date,bolum,cb){
    if(!data.ogunGecmisi)data.ogunGecmisi={};if(!data.ogunGecmisi[date])data.ogunGecmisi[date]=[];
    var bs=[{k:'kahvalti',l:'Kahvaltı'},{k:'ogle',l:'Öğle'},{k:'aksam',l:'Akşam'},{k:'ara',l:'Ara Öğün'}];

    M.body().querySelector('#saveOM').onclick=function(){var ad=document.getElementById('oad').value.trim();if(!ad){D.alert('Öğün adı zorunlu!');return;}var b=document.getElementById('obol').value;data.ogunGecmisi[date].push({ad:ad,bolum:b,kalori:+(document.getElementById('okal').value||0),protein:+(document.getElementById('opro').value||0),karbonhidrat:+(document.getElementById('okar').value||0),yag:+(document.getElementById('oyag').value||0),lif:0,vitamin_c:0,demir:0,kalsiyum:0,magnezyum:0});S.save(data);cb&&cb();M.close();};
  }

  function oOlcum(data,cb){
    var o=data.olcumler,p=data.profil,isK=p.cinsiyet==='Kadın';
    M.open('Yeni Ölçüm','<div class="fr"><div class="fg"><label class="fl">Kilo (kg)</label><input class="fi" id="okilo" type="number" value="'+(p.kilo||'')+'"></div><div class="fg"><label class="fl">Not</label><input class="fi" id="onot" placeholder="Sabah..."></div></div><div class="ibox">Bel + Boyun girilirse yağ oranı hesaplanır</div><div class="fr"><div class="fg"><label class="fl">Bel (cm)</label><input class="fi" id="obel" type="number" value="'+(o.bel||'')+'"></div><div class="fg"><label class="fl">Boyun (cm)</label><input class="fi" id="oboyun" type="number" value="'+(o.boyun||'')+'"></div></div>'+(isK?'<div class="fg"><label class="fl">Kalça (cm)*</label><input class="fi" id="okalca" type="number" value="'+(o.kalca||'')+'"></div>':'<div class="fr"><div class="fg"><label class="fl">Kalça (cm)</label><input class="fi" id="okalca" type="number" value="'+(o.kalca||'')+'"></div><div class="fg"><label class="fl">Göğüs (cm)</label><input class="fi" id="ogogus" type="number" value="'+(o.gogus||'')+'"></div></div>')+'<div class="fr"><div class="fg"><label class="fl">Omuz (cm)</label><input class="fi" id="oomuz" type="number" value="'+(o.omuz||'')+'"></div><div class="fg"><label class="fl">Uyluk (cm)</label><input class="fi" id="obacak" type="number" value="'+(o.bacak||'')+'"></div></div>'+(isK?'<div class="fg"><label class="fl">Göğüs (cm)</label><input class="fi" id="ogogus" type="number" value="'+(o.gogus||'')+'"></div>':'')+'<button class="btn bl bf" id="saveOlc">Kaydet & Analiz Et</button>');
    M.body().querySelector('#saveOlc').onclick=function(){var kilo=document.getElementById('okilo').value;data.profil.kilo=kilo;['bel','boyun','kalca','omuz','bacak'].forEach(function(k){var el2=document.getElementById('o'+k);if(el2)data.olcumler[k]=el2.value;});data.olcumler.gogus=document.getElementById('ogogus')?document.getElementById('ogogus').value:(o.gogus||'');var an2=C.vag(data.profil,data.olcumler);if(!data.olcumGecmisi)data.olcumGecmisi=[];data.olcumGecmisi.push({id:S.uid(),tarih:S.today(),kilo:kilo,not:document.getElementById('onot').value,fat:an2?an2.fat:null,bmi:an2?an2.bmi:null,tip:an2?an2.tip:null,olcumler:Object.assign({},data.olcumler)});if(!data.profil.manuelMod){var c3=C.hesapla(data.profil);if(c3)['kalori','protein','karbonhidrat','yag','lif','vitamin_c','demir','kalsiyum','magnezyum'].forEach(function(k){data.macros[k]=c3[k];});}S.save(data);cb&&cb();M.close();};
  }

  function oUyku(data,cb){
    M.open('Uyku Kaydı','<div class="fr"><div class="fg"><label class="fl">Tarih</label><input class="fi" id="utar" type="date" value="'+S.today()+'"></div><div class="fg"><label class="fl">Süre (saat)</label><input class="fi" id="usure" type="number" step="0.5" placeholder="7.5"></div></div><div class="fr"><div class="fg"><label class="fl">Yatış</label><input class="fi" id="uyat" type="time" value="23:00"></div><div class="fg"><label class="fl">Kalkış</label><input class="fi" id="ukal" type="time" value="07:00"></div></div><button class="btn bl bf" id="saveUy">Kaydet</button>');
    M.body().querySelector('#saveUy').onclick=function(){var sure=document.getElementById('usure').value;if(!sure){var y=document.getElementById('uyat').value,k2=document.getElementById('ukal').value;if(y&&k2){var yh=+y.split(':')[0],ym=+y.split(':')[1],kh=+k2.split(':')[0],km=+k2.split(':')[1];var d2=(kh*60+km)-(yh*60+ym);if(d2<0)d2+=1440;sure=(d2/60).toFixed(1);}else sure='7';}if(!data.uyku)data.uyku=[];data.uyku.push({id:S.uid(),tarih:document.getElementById('utar').value,sure:+sure,yatis:document.getElementById('uyat').value,kalkis:document.getElementById('ukal').value,kalite:3});S.save(data);cb&&cb();M.close();};
  }

  return{render};
})();

/* ===== PAGE SPOR ===== */
const PageSpor=(() => {
  let tSec=0,tRun=false,tInt=null;
  function render(data){
    const el=document.getElementById('page-spor');const egz=data.egzersizler||[];
    el.innerHTML=`<div class="card"><div style="font-size:12px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">⏱ Dinlenme Zamanlayıcı</div><div class="tdisp" id="tDisp">${fmt(tSec)}</div><div style="display:flex;gap:10px;justify-content:center;margin-top:10px"><button class="btn bl" id="tSS">▶ Başlat</button><button class="btn bo" id="tRes">↺ Sıfırla</button></div><div class="tpresets mt8"><button class="tpb" data-sec="30">30s</button><button class="tpb" data-sec="60">1dk</button><button class="tpb" data-sec="90">1:30</button><button class="tpb" data-sec="120">2dk</button><button class="tpb" data-sec="180">3dk</button><button class="tpb" id="tCust">✎ Özel</button></div></div><div class="fb"><div class="st" style="margin-top:0">Antrenman</div><button class="btn bl bsm" id="addEgz">+ Hareket</button></div>${egz.length===0?`<div class="es"><div class="ei">🏋️</div><div class="ett">Program yok</div><div class="ed">+ Hareket ekle ile başla.</div></div>`:egz.map(rEgz).join('')}`;
    {const _qt=el.querySelector('#tSS');if(_qt)_qt.onclick=()=>toggleT(el);}
    {const _qt=el.querySelector('#tRes');if(_qt)_qt.onclick=()=>{stopT();tSec=0;el.querySelector('#tDisp').textContent='00:00';el.querySelector('#tSS').textContent='▶ Başlat';};}
    el.querySelectorAll('.tpb[data-sec]').forEach(b=>b.onclick=()=>{stopT();tSec=+b.dataset.sec;el.querySelector('#tDisp').textContent=fmt(tSec);el.querySelector('#tSS').textContent='▶ Başlat';});
    {const _qt=el.querySelector('#tCust');if(_qt)_qt.onclick=()=>D.prompt('Kaç saniye?','120','').then(v=>{if(v&&!isNaN(v)){stopT();tSec=+v;el.querySelector('#tDisp').textContent=fmt(tSec);el.querySelector('#tSS').textContent='▶ Başlat';}});}
    el.querySelectorAll('.spill').forEach(p=>p.onclick=()=>p.classList.toggle('done'));
    {const _qt=el.querySelector('#addEgz');if(_qt)_qt.onclick=()=>openEgz(data);}
    el.querySelectorAll('.eedit').forEach(b=>b.onclick=()=>{const e=data.egzersizler.find(x=>x.id===b.dataset.id);if(e)openEgz(data,e);});
    el.querySelectorAll('.edel').forEach(b=>b.onclick=()=>D.confirm('Bu hareketi silmek istiyor musun?').then(ok=>{if(ok){data.egzersizler=data.egzersizler.filter(x=>x.id!==b.dataset.id);S.save(data);render(data);}}));
  }
  function rEgz(e){const tc={Ağırlık:'blime',Kardiyo:'bgreen',Calisthenics:'bblue',Esneme:'bgray'};return`<div class="exc"><div class="fb" style="margin-bottom:10px"><div><div style="font-size:16px;font-weight:800">${e.ad}</div><span class="badge ${tc[e.tip]||'blime'}" style="margin-top:4px">${e.tip}</span></div><div class="flex g8"><button class="ib eedit" data-id="${e.id}">✏️</button><button class="ib edel" data-id="${e.id}">🗑️</button></div></div>${e.setler.length>0?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:6px">${e.setler.map(s=>`<div class="spill" style="line-height:1.4">${s.agirlik?'<div style=\"font-size:10px;color:#999;line-height:1\">'+(s.agirlik)+'kg</div>':''}${s.tekrar}x</div>`).join('')}</div>`:''}${e.notlar?`<div class="tm mt8">📝 ${e.notlar}</div>`:''}</div>`;}
  function openEgz(data,ex){
    const isE=!!ex,e=ex||{id:S.uid(),ad:'',tip:'Ağırlık',setler:[],notlar:''};let sl=[...e.setler];
    function rs(){const c=document.getElementById('sCont');if(!c)return;c.innerHTML=sl.map((s,i)=>`<div style="display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:8px"><input class="fi" id="st${i}" type="number" value="${s.tekrar}" placeholder="Tekrar"><input class="fi" id="sa${i}" type="number" value="${s.agirlik||''}" placeholder="Kg"><button class="ib dst" data-i="${i}">✕</button></div>`).join('')+`<button class="btn bo bsm" id="addS">+ Set</button>`;c.querySelectorAll('.dst').forEach(b=>b.onclick=()=>{sl.splice(+b.dataset.i,1);rs();});c.querySelector('#addS')?.addEventListener('click',()=>{sl.push({tekrar:10,agirlik:''});rs();});}
    M.open(isE?'Hareketi Düzenle':'Yeni Hareket',`<div class="fg"><label class="fl">Hareket Adı</label><input class="fi" id="ead" value="${e.ad}" placeholder="Bench Press..."></div><div class="fg"><label class="fl">Tip</label><select class="fs" id="etip">${['Ağırlık','Kardiyo','Calisthenics','Esneme'].map(t=>`<option ${e.tip===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="st">Setler</div><div id="sCont"></div><div class="fg mt12"><label class="fl">Notlar</label><textarea class="fta" id="enot">${e.notlar||''}</textarea></div><button class="btn bl bf" id="sEgz">${isE?'Güncelle':'Ekle'}</button>${isE?'<button class="btn bd bf mt8" id="dEgz">Sil</button>':''}`);
    rs();
    M.body().querySelector('#sEgz').onclick=()=>{e.ad=document.getElementById('ead').value;e.tip=document.getElementById('etip').value;e.setler=sl.map((_,i)=>({tekrar:+document.getElementById('st'+i)?.value||0,agirlik:document.getElementById('sa'+i)?.value||''}));e.notlar=document.getElementById('enot').value;if(isE){const idx=data.egzersizler.findIndex(x=>x.id===e.id);if(idx!==-1)data.egzersizler[idx]=e;}else data.egzersizler.push(e);S.save(data);render(data);M.close();};
    if(isE)M.body().querySelector('#dEgz')?.addEventListener('click',()=>{data.egzersizler=data.egzersizler.filter(x=>x.id!==e.id);S.save(data);render(data);M.close();});
  }
  function fmt(s){return`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;}
  function toggleT(el){if(tSec<=0&&!tRun){D.alert('Önce bir süre seçin.','Zamanlayıcı');return;}if(tRun){stopT();el.querySelector('#tSS').textContent='▶ Devam';}else{tRun=true;el.querySelector('#tSS').textContent='⏸ Duraklat';tInt=setInterval(()=>{if(tSec>0){tSec--;const d=document.getElementById('tDisp');if(d)d.textContent=fmt(tSec);if(tSec===0){stopT();if(navigator.vibrate)navigator.vibrate([200,100,200]);const b=document.getElementById('tSS');if(b)b.textContent='▶ Başlat';}}else{stopT();const b=document.getElementById('tSS');if(b)b.textContent='▶ Başlat';}},1000);}}
  function stopT(){clearInterval(tInt);tRun=false;}
  return{render};
})();


/* ===== PAGE TARİFLER ===== */
const PageTarifler=(() => {
  function render(data){
    const el=document.getElementById('page-tarifler');const cats=['Tümü','Kahvaltı','Öğle','Akşam','Ara Öğün','İçecek'];
    el.innerHTML=`<div class="fb" style="margin-bottom:14px"><div style="font-size:22px;font-weight:900">Tariflerim 🍽️</div><button class="btn bl bsm" id="addTarif">+ Tarif</button></div><div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none">${cats.map(c=>`<button class="btn bsm ${c==='Tümü'?'bl':'bo'} catb" data-cat="${c}" style="white-space:nowrap;border-radius:100px">${c}</button>`).join('')}</div><div id="tList" style="margin-top:12px">${rList(data.tarifler,'Tümü')}</div>`;
    {const _qt=el.querySelector('#addTarif');if(_qt)_qt.onclick=()=>openT(data);}
    el.querySelectorAll('.catb').forEach(b=>b.onclick=()=>{el.querySelectorAll('.catb').forEach(x=>{x.classList.remove('bl');x.classList.add('bo');});b.classList.add('bl');b.classList.remove('bo');el.querySelector('#tList').innerHTML=rList(data.tarifler,b.dataset.cat);attachT(el,data);});
    attachT(el,data);
  }
  function rList(tr,cat){const f=cat==='Tümü'?tr:tr.filter(t=>t.kategori===cat);if(!f.length)return`<div class="es"><div class="ei">📖</div><div class="ett">Tarif yok</div><div class="ed">+ Tarif butonuyla ekle.</div></div>`;return f.map(t=>`<div class="rc" data-id="${t.id}">${t.foto?`<img src="${t.foto}" style="width:100%;height:130px;object-fit:cover;border-radius:12px;margin-bottom:10px"/>`:''}  <div style="font-size:16px;font-weight:800;margin-bottom:8px">${t.ad}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${t.sure?`<span class="badge bblue">⏱ ${t.sure}dk</span>`:''}${t.kalori?`<span class="badge blime">🔥 ${t.kalori} kcal</span>`:''}${t.protein?`<span class="badge bblue">P:${t.protein}g</span>`:''}${t.kategori?`<span class="badge bgreen">${t.kategori}</span>`:''}</div>${t.malzemeler?`<div class="tm mt8">${t.malzemeler.slice(0,60)}${t.malzemeler.length>60?'…':''}</div>`:''}</div>`).join('');}

    cont.querySelectorAll('.drit').forEach(item=>{
      item.addEventListener('touchstart',e=>{drag=item;item.classList.add('dragging');},{passive:true});
      item.addEventListener('touchmove',e=>{if(!drag)return;const t=e.touches[0];Array.from(cont.querySelectorAll('.drit:not(.dragging)')).forEach(el2=>{const r=el2.getBoundingClientRect();if(t.clientY>r.top&&t.clientY<r.bottom)dov=el2;});if(dov&&dov!==drag){const items=Array.from(cont.querySelectorAll('.drit'));cont.insertBefore(drag,items.indexOf(drag)<items.indexOf(dov)?dov.nextSibling:dov);dov=null;}},{passive:true});
      item.addEventListener('touchend',()=>{if(drag)drag.classList.remove('dragging');const ns=Array.from(cont.querySelectorAll('.drit')).map(el2=>el2.dataset.key);data.settings.dashboardSira=ns;S.save(data);ra();drag=null;dov=null;});
    });
  }

  function oProfil(data,cb){
    const p=data.profil;
    M.open('Profil Düzenle',`<div class="fg"><label class="fl">Ad Soyad</label><input class="fi" id="fad" value="${p.ad||''}"></div><div class="fr"><div class="fg"><label class="fl">Kilo (kg)</label><input class="fi" id="fkilo" type="number" value="${p.kilo||''}"></div><div class="fg"><label class="fl">Hedef Kilo (kg)</label><input class="fi" id="fhkilo" type="number" value="${p.hedefKilo||''}"></div></div><div class="fg"><label class="fl">Başlangıç Kilosu (kg)</label><input class="fi" id="fbkilo" type="number" value="${p.baslangicKilo||p.kilo||''}"><div style="font-size:11px;color:#bbb;margin-top:3px">İlerleme çubuğu için</div></div><div class="fr"><div class="fg"><label class="fl">Boy (cm)</label><input class="fi" id="fboy" type="number" value="${p.boy||''}"></div><div class="fg"><label class="fl">Yaş</label><input class="fi" id="fyas" type="number" value="${p.yas||''}"></div></div><div class="fg"><label class="fl">Cinsiyet</label><select class="fs" id="fcins"><option ${p.cinsiyet==='Erkek'?'selected':''}>Erkek</option><option ${p.cinsiyet==='Kadın'?'selected':''}>Kadın</option></select></div><button class="btn bl bf" id="sProf">Kaydet</button>`);
    M.body().querySelector('#sProf').onclick=()=>{p.ad=document.getElementById('fad').value;p.kilo=document.getElementById('fkilo').value;p.hedefKilo=document.getElementById('fhkilo').value;p.baslangicKilo=document.getElementById('fbkilo').value;p.boy=document.getElementById('fboy').value;p.yas=document.getElementById('fyas').value;p.cinsiyet=document.getElementById('fcins').value;if(!p.manuelMod){const calc=C.hesapla(p);if(calc)['kalori','protein','karbonhidrat','yag','lif','vitamin_c','demir','kalsiyum','magnezyum'].forEach(k=>{data.macros[k]=calc[k];});}S.save(data);cb&&cb();M.close();};
  }

  function oHesap(data,cb){
    const p=data.profil;
    M.open('Hesap & Makro',`<div class="fg"><label class="fl">Aktivite</label><select class="fs" id="hakt">${Object.entries(C.aLabels).map(([v,l])=>`<option value="${v}" ${p.aktivite===v?'selected':''}>${l}</option>`).join('')}</select></div><div class="fg"><label class="fl">Hedef</label><select class="fs" id="hhdf">${Object.entries(C.hLabels).map(([v,l])=>`<option value="${v}" ${p.hedef===v?'selected':''}>${l}</option>`).join('')}</select></div><div class="fr"><div class="fg"><label class="fl">Protein (g/kg)</label><select class="fs" id="hpro"><option value="1.6" ${p.proteinOrani==='1.6'?'selected':''}>1.6</option><option value="2.0" ${p.proteinOrani==='2.0'?'selected':''}>2.0</option><option value="2.2" ${p.proteinOrani==='2.2'?'selected':''}>2.2</option></select></div><div class="fg"><label class="fl">Yağ (g/kg)</label><select class="fs" id="hyag"><option value="0.8" ${p.yagOrani==='0.8'?'selected':''}>0.8</option><option value="0.9" ${p.yagOrani==='0.9'?'selected':''}>0.9</option><option value="1.0" ${p.yagOrani==='1.0'?'selected':''}>1.0</option></select></div></div><div class="fg"><div style="display:flex;gap:10px"><button class="btn ${!p.manuelMod?'bl':'bo'} bsm" id="autoM">🤖 Otomatik</button><button class="btn ${p.manuelMod?'bl':'bo'} bsm" id="manM">✏️ Manuel</button></div></div><div id="onizleme"></div><button class="btn bl bf" id="sHes">Uygula</button>`);
    let mfl=p.manuelMod;
    M.body().querySelector('#autoM').onclick=()=>{mfl=false;M.body().querySelector('#autoM').className='btn bl bsm';M.body().querySelector('#manM').className='btn bo bsm';};
    M.body().querySelector('#manM').onclick=()=>{mfl=true;M.body().querySelector('#manM').className='btn bl bsm';M.body().querySelector('#autoM').className='btn bo bsm';};
    function gunc(){const tmp={...data.profil,aktivite:document.getElementById('hakt').value,hedef:document.getElementById('hhdf').value,proteinOrani:document.getElementById('hpro').value,yagOrani:document.getElementById('hyag').value};const calc=C.hesapla(tmp);if(calc)document.getElementById('onizleme').innerHTML=`<div class="bmrb" style="margin-bottom:12px"><div style="font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Önizleme</div><div style="display:flex;justify-content:space-between;padding:2px 0"><span style="font-size:13px;opacity:.8">Hedef Kalori</span><span style="font-size:16px;font-weight:900">${calc.kalori} kcal</span></div><div style="display:flex;justify-content:space-between;padding:2px 0"><span style="font-size:13px;opacity:.8">P / K / Y</span><span style="font-size:14px;font-weight:900">${calc.protein}g / ${calc.karbonhidrat}g / ${calc.yag}g</span></div></div>`;}
    ['hakt','hhdf','hpro','hyag'].forEach(id=>document.getElementById(id)?.addEventListener('change',gunc));
    gunc();
    M.body().querySelector('#sHes').onclick=()=>{p.aktivite=document.getElementById('hakt').value;p.hedef=document.getElementById('hhdf').value;p.proteinOrani=document.getElementById('hpro').value;p.yagOrani=document.getElementById('hyag').value;p.manuelMod=mfl;if(!mfl){const calc=C.hesapla(p);if(calc)['kalori','protein','karbonhidrat','yag','lif','vitamin_c','demir','kalsiyum','magnezyum'].forEach(k=>{data.macros[k]=calc[k];});}S.save(data);cb&&cb();M.close();};
  }

  return{render,openHesap:oHesap};
})();



/* ===== APP INIT ===== */
document.addEventListener('DOMContentLoaded',function(){
  var data=S.load();
  T.init(data.settings?data.settings.theme||'light':'light');

  function updateHeader(){
    var p=data.profil||{};
    var ne=document.getElementById('hNameEl');
    var we=document.getElementById('hWeightEl');
    var te=document.getElementById('hTargetEl');
    var pb=document.getElementById('hpbarFill');
    if(ne)ne.textContent=p.ad?'Merhaba, '+p.ad+'! 👋':'Merhaba! 👋';
    if(we)we.textContent=p.kilo||'—';
    if(te)te.textContent=p.hedefKilo||'—';
    if(pb){
      var kilo=parseFloat(p.kilo)||0;
      var hedef=parseFloat(p.hedefKilo)||0;
      var baslangic=parseFloat(p.baslangicKilo)||kilo;
      var pct=0;
      if(hedef>0&&baslangic!==hedef){
        var total=Math.abs(baslangic-hedef);
        var done=Math.abs(baslangic-kilo);
        pct=Math.min(100,Math.max(0,Math.round((done/total)*100)));
      }
      pb.style.width=pct+'%';
    }
  }

  function ra(){
    data=S.load();
    updateHeader();
    try{PageAna.render(data);}catch(e){console.error('PageAna error:',e);}
    try{PageSpor.render(data);}catch(e){console.error('PageSpor error:',e);}
    try{PageTarifler.render(data);}catch(e){console.error('PageTarifler error:',e);}
    try{PageAlisveris.render(data);}catch(e){console.error('PageAlisveris error:',e);}
    try{PageAyarlar.render(data,ra);}catch(e){console.error('PageAyarlar error:',e);}
  }
  ra();

  document.querySelectorAll('.nav-btn').forEach(function(btn){
    btn.onclick=function(){
      document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
      document.getElementById('page-'+btn.dataset.page).classList.add('active');
    };
  });

  document.getElementById('settingsBtn').onclick=function(){
    document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
    document.getElementById('page-ayarlar').classList.add('active');
    PageAyarlar.render(data,ra);
  };
});

</script>
</body>
</html>
