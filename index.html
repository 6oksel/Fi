<!DOCTYPE html>

<html lang="tr" data-theme="auto">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>FitApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f5f4f0;--bg2:#ebe9e3;--surface:#fff;--surface2:#f0eee9;--border:#d8d5cd;--text:#1a1917;--text2:#6b6860;--accent:#e8501a;--accent2:#ff7849;--accent-bg:#fde8e0;--green:#2d8a4e;--green-bg:#e0f5e9;--blue:#1a6fb5;--blue-bg:#ddeeff;--yellow:#c47d00;--yellow-bg:#fff3d0;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14);--radius:16px;--radius-sm:10px;--nav-h:72px;--header-h:56px;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--transition:.2s ease}
[data-theme=dark]{--bg:#111210;--bg2:#1a1917;--surface:#222220;--surface2:#2a2927;--border:#3a3835;--text:#f0ede8;--text2:#8a8780;--accent:#ff6a35;--accent2:#ff9060;--accent-bg:#3a1a0e;--green:#3dba68;--green-bg:#0e2e1a;--blue:#4a9ee0;--blue-bg:#0e2035;--yellow:#f0a830;--yellow-bg:#2a1e00;--shadow:0 2px 12px rgba(0,0,0,.4);--shadow-lg:0 8px 32px rgba(0,0,0,.6)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;background:var(--bg)}
@media(min-width:768px){body{background:var(--bg2)}#app{margin:24px auto;height:calc(100dvh - 48px);border-radius:28px;overflow:hidden;box-shadow:var(--shadow-lg)}}
.app-header{display:flex;align-items:center;justify-content:space-between;height:var(--header-h);padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.app-logo{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-.5px}
.header-right{display:flex;gap:4px}
.page-container{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px 16px calc(16px + var(--nav-h));opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity var(--transition),transform var(--transition);-webkit-overflow-scrolling:touch}
.page.active{opacity:1;pointer-events:all;transform:translateY(0)}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:var(--nav-h);display:flex;background:var(--surface);border-top:1px solid var(--border);z-index:10;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text2);transition:color var(--transition);padding:8px 4px}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-family:var(--font-body);font-size:11px;font-weight:500}
.section-title{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin:20px 0 10px}
.card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.card-row:last-child{border-bottom:none}
.card-row-label{font-size:14px;color:var(--text2)}
.card-row-value{font-family:var(--font-display);font-size:15px;font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);border:none;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:opacity var(--transition),transform var(--transition);white-space:nowrap}
.btn:active{transform:scale(.97);opacity:.85}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-danger{background:#e53935;color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-full{width:100%}
.icon-btn{background:var(--surface2);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:background var(--transition);color:var(--text)}
.icon-btn:hover{background:var(--border)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:15px;color:var(--text);outline:none;transition:border-color var(--transition)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:12px;font-weight:600}
.badge-accent{background:var(--accent-bg);color:var(--accent)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0));box-shadow:var(--shadow-lg);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-header h3{font-family:var(--font-display);font-size:18px;font-weight:700}
.macro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.macro-card{background:var(--surface);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow)}
.macro-value{font-family:var(--font-display);font-size:22px;font-weight:800;line-height:1;margin-bottom:4px}
.macro-label{font-size:12px;color:var(--text2);font-weight:500}
.macro-unit{font-size:12px;color:var(--text2)}
.exercise-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.exercise-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.exercise-name{font-family:var(--font-display);font-size:16px;font-weight:700}
.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px}
.set-pill{background:var(--bg2);border-radius:8px;padding:6px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:background var(--transition),color var(--transition);border:1.5px solid transparent}
.set-pill.done{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.timer-card{background:var(--accent);border-radius:var(--radius);padding:20px;text-align:center;color:#fff;margin-bottom:12px}
.timer-display{font-family:var(--font-display);font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:12px}
.timer-controls{display:flex;gap:10px;justify-content:center}
.timer-btn{background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:10px 20px;color:#fff;font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;transition:background var(--transition)}
.timer-btn:hover{background:rgba(255,255,255,.35)}
.timer-presets{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.timer-preset-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:100px;padding:5px 14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.recipe-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:transform var(--transition)}
.recipe-card:active{transform:scale(.98)}
.recipe-card-title{font-family:var(--font-display);font-size:17px;font-weight:700;margin-bottom:6px}
.recipe-meta{display:flex;gap:8px;flex-wrap:wrap}
.shop-item{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);transition:opacity var(--transition)}
.shop-item.checked{opacity:.5}
.shop-item.checked .shop-item-name{text-decoration:line-through}
.shop-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.shop-check.checked{background:var(--green);border-color:var(--green);color:#fff;font-size:12px}
.shop-item-name{flex:1;font-size:15px}
.shop-item-qty{font-size:13px;color:var(--text2)}
.measure-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.measure-cell{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 8px;text-align:center}
.measure-cell-val{font-family:var(--font-display);font-size:18px;font-weight:800}
.measure-cell-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.history-item:last-child{border-bottom:none}
.history-date{color:var(--text2);font-size:12px}
.empty-state{text-align:center;padding:48px 24px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-desc{font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.flex{display:flex}.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap-8{gap:8px}.mt-8{margin-top:8px}.mt-16{margin-top:16px}
.text-accent{color:var(--accent)}.text-muted{color:var(--text2);font-size:13px}
.fw-700{font-weight:700}.font-display{font-family:var(--font-display)}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-left"><span class="app-logo">⚡ FitApp</span></div>
    <div class="header-right">
      <button id="themeToggle" class="icon-btn">🔄</button>
      <button id="exportBtn" class="icon-btn" title="Yedek Al">⬆️</button>
      <button id="importBtn" class="icon-btn" title="Yedek Yükle">⬇️</button>
      <input type="file" id="importFile" accept=".json" style="display:none"/>
    </div>
  </header>
  <main class="page-container">
    <div id="page-genel" class="page active"></div>
    <div id="page-spor" class="page"></div>
    <div id="page-tarifler" class="page"></div>
    <div id="page-alisveris" class="page"></div>
  </main>
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="genel"><span class="nav-icon">🏠</span><span class="nav-label">Genel</span></button>
    <button class="nav-btn" data-page="spor"><span class="nav-icon">💪</span><span class="nav-label">Spor</span></button>
    <button class="nav-btn" data-page="tarifler"><span class="nav-icon">🍽️</span><span class="nav-label">Tarifler</span></button>
    <button class="nav-btn" data-page="alisveris"><span class="nav-icon">🛒</span><span class="nav-label">Alışveriş</span></button>
  </nav>
</div>
<div id="modalOverlay" class="modal-overlay hidden">
  <div id="modalBox" class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button id="modalClose" class="icon-btn">✕</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>

<script>
// ==================== STORE ====================
const Store = (() => {
  const KEY = 'fitapp_data';
  const defaultData = {
    macros:{kalori:2200,protein:160,karbonhidrat:250,yag:65,lif:30,vitamin_c:90,demir:18,kalsiyum:1000,magnezyum:400},
    profil:{ad:'',kilo:'',boy:'',yas:'',cinsiyet:'Erkek'},
    olcumler:{gogus:'',bel:'',kalca:'',biceps_sag:'',biceps_sol:'',uyluk_sag:'',uyluk_sol:'',omuz:'',boyun:''},
    olcumGecmisi:[],egzersizler:[],tarifler:[],alisveris:[],
    settings:{theme:'auto',customBreak:90}
  };
  function load(){try{const r=localStorage.getItem(KEY);if(!r)return JSON.parse(JSON.stringify(defaultData));const d=JSON.parse(JSON.stringify(defaultData));const p=JSON.parse(r);return deepMerge(d,p);}catch{return JSON.parse(JSON.stringify(defaultData))}}
  function deepMerge(target,source){for(const k in source){if(source[k]&&typeof source[k]==='object'&&!Array.isArray(source[k])){if(!target[k])target[k]={};deepMerge(target[k],source[k]);}else{target[k]=source[k];}}return target;}
  function save(data){localStorage.setItem(KEY,JSON.stringify(data))}
  function exportJSON(data){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`fitapp_yedek_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url)}
  function importJSON(file,cb){const r=new FileReader();r.onload=e=>{try{cb(null,JSON.parse(e.target.result))}catch{cb(new Error('Geçersiz JSON'))}};r.readAsText(file)}
  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
  function today(){return new Date().toLocaleDateString('tr-TR')}
  return{load,save,exportJSON,importJSON,uid,today};
})();

// ==================== THEME ====================
const Theme = (() => {
  let current='auto';
  function apply(theme){
    current=theme;
    const root=document.documentElement;
    if(theme==='auto'){root.setAttribute('data-theme',window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');}
    else root.setAttribute('data-theme',theme);
    const btn=document.getElementById('themeToggle');
    if(btn)btn.textContent=theme==='dark'?'☀️':theme==='light'?'🌙':'🔄';
  }
  function toggle(){const order=['auto','light','dark'];const next=order[(order.indexOf(current)+1)%order.length];apply(next);return next;}
  function init(saved){apply(saved||'auto');window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{if(current==='auto')apply('auto');});}
  return{init,toggle,getCurrent:()=>current};
})();

// ==================== MODAL ====================
const Modal = (() => {
  let onCloseCb=null;
  function open(title,bodyHTML,onClose){
    document.getElementById('modalTitle').textContent=title;
    document.getElementById('modalBody').innerHTML=bodyHTML;
    document.getElementById('modalOverlay').classList.remove('hidden');
    onCloseCb=onClose||null;
  }
  function close(){
    document.getElementById('modalOverlay').classList.add('hidden');
    if(onCloseCb){onCloseCb();onCloseCb=null;}
  }
  function getBody(){return document.getElementById('modalBody')}
  document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('modalClose').addEventListener('click',close);
    document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))close();});
  });
  return{open,close,getBody};
})();

// ==================== PAGE: GENEL ====================
const PageGenel = (() => {
  function render(data){
    const el=document.getElementById('page-genel');
    const m=data.macros,p=data.profil,o=data.olcumler,hist=data.olcumGecmisi||[];
    el.innerHTML=`
      <div class="flex-between">
        <div>
          <div style="font-family:var(--font-display);font-size:24px;font-weight:800;line-height:1.1">${p.ad?'Merhaba,<br>'+p.ad+'! 👋':'FitApp 👋'}</div>
          <div class="text-muted mt-8">${Store.today()}</div>
        </div>
        <button class="btn btn-outline btn-sm" id="editProfilBtn">✏️ Profil</button>
      </div>
      <div class="section-title">Günlük Makro Hedefler</div>
      <div class="macro-grid">
        <div class="macro-card"><div class="macro-value text-accent">${m.kalori}</div><div class="macro-label">Kalori</div><div class="macro-unit">kcal</div></div>
        <div class="macro-card"><div class="macro-value" style="color:var(--blue)">${m.protein}</div><div class="macro-label">Protein</div><div class="macro-unit">g</div></div>
        <div class="macro-card"><div class="macro-value" style="color:var(--yellow)">${m.karbonhidrat}</div><div class="macro-label">Karbonhidrat</div><div class="macro-unit">g</div></div>
        <div class="macro-card"><div class="macro-value" style="color:var(--green)">${m.yag}</div><div class="macro-label">Yağ</div><div class="macro-unit">g</div></div>
      </div>
      <div class="section-title">Mikro Besinler</div>
      <div class="card">
        ${mRow('🌿 Lif',m.lif,'g')}${mRow('🍊 Vitamin C',m.vitamin_c,'mg')}${mRow('🩸 Demir',m.demir,'mg')}${mRow('🦴 Kalsiyum',m.kalsiyum,'mg')}${mRow('⚡ Magnezyum',m.magnezyum,'mg')}
      </div>
      <button class="btn btn-accent btn-sm" id="editMacroBtn" style="margin-bottom:4px">✏️ Makro/Mikro Düzenle</button>
      <div class="section-title">Vücut Bilgileri</div>
      <div class="card">
        <div class="flex-between" style="margin-bottom:12px">
          <div>
            <div style="font-family:var(--font-display);font-size:32px;font-weight:800">${p.kilo||'—'} <span style="font-size:16px;color:var(--text2)">kg</span></div>
            <div class="text-muted">${p.boy?p.boy+' cm • ':''} ${p.yas?p.yas+' yaş • ':''} ${p.cinsiyet}</div>
          </div>
          <button class="btn btn-accent btn-sm" id="yeniOlcumBtn">+ Ölçüm</button>
        </div>
        <div class="measure-grid">
          ${mCell('Göğüs',o.gogus)}${mCell('Bel',o.bel)}${mCell('Kalça',o.kalca)}
          ${mCell('Biceps Sağ',o.biceps_sag)}${mCell('Biceps Sol',o.biceps_sol)}${mCell('Omuz',o.omuz)}
          ${mCell('Uyluk Sağ',o.uyluk_sag)}${mCell('Uyluk Sol',o.uyluk_sol)}${mCell('Boyun',o.boyun)}
        </div>
      </div>
      <div class="section-title">Ölçüm Geçmişi ${hist.length>0?`<span class="badge badge-accent">${hist.length}</span>`:''}</div>
      <div class="card">
        ${hist.length===0?'<div class="text-muted" style="text-align:center;padding:12px">Henüz kayıt yok</div>':''}
        ${hist.slice().reverse().slice(0,8).map(h=>`<div class="history-item"><div><div class="fw-700 font-display">${h.kilo} kg</div><div class="text-muted">${h.not||''}</div></div><div class="history-date">${h.tarih}</div></div>`).join('')}
        ${hist.length>8?`<div class="text-muted" style="text-align:center;padding-top:8px">+ ${hist.length-8} kayıt daha</div>`:''}
      </div>`;
    el.querySelector('#editProfilBtn')?.addEventListener('click',()=>openProfil(data));
    el.querySelector('#editMacroBtn')?.addEventListener('click',()=>openMacro(data));
    el.querySelector('#yeniOlcumBtn')?.addEventListener('click',()=>openOlcum(data));
  }
  function mRow(l,v,u){return`<div class="card-row"><span class="card-row-label">${l}</span><span class="card-row-value">${v} <span style="font-size:12px;color:var(--text2)">${u}</span></span></div>`}
  function mCell(l,v){return`<div class="measure-cell"><div class="measure-cell-val">${v||'—'}</div><div class="measure-cell-lbl">${l}</div></div>`}
  function openProfil(data){
    const p=data.profil;
    Modal.open('Profil Düzenle',`
      <div class="form-group"><label class="form-label">Ad Soyad</label><input class="form-input" id="f_ad" value="${p.ad||''}" placeholder="Adın..."></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Kilo (kg)</label><input class="form-input" id="f_kilo" type="number" value="${p.kilo||''}" placeholder="70"></div>
        <div class="form-group"><label class="form-label">Boy (cm)</label><input class="form-input" id="f_boy" type="number" value="${p.boy||''}" placeholder="175"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Yaş</label><input class="form-input" id="f_yas" type="number" value="${p.yas||''}" placeholder="25"></div>
        <div class="form-group"><label class="form-label">Cinsiyet</label><select class="form-select" id="f_cins"><option ${p.cinsiyet==='Erkek'?'selected':''}>Erkek</option><option ${p.cinsiyet==='Kadın'?'selected':''}>Kadın</option></select></div>
      </div>
      <button class="btn btn-accent btn-full" id="saveProfil">Kaydet</button>`);
    Modal.getBody().querySelector('#saveProfil').addEventListener('click',()=>{
      data.profil.ad=document.getElementById('f_ad').value;
      data.profil.kilo=document.getElementById('f_kilo').value;
      data.profil.boy=document.getElementById('f_boy').value;
      data.profil.yas=document.getElementById('f_yas').value;
      data.profil.cinsiyet=document.getElementById('f_cins').value;
      Store.save(data);render(data);Modal.close();
    });
  }
  function openMacro(data){

function fmt(s){return`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`}
function toggleTimer(el){
if(timerRunning){stopTimer();el.querySelector(’#timerSS’).textContent=‘▶ Devam’;}
else{timerRunning=true;el.querySelector(’#timerSS’).textContent=‘⏸ Duraklat’;
timerInterval=setInterval(()=>{if(timerSeconds>0){timerSeconds–;const d=document.getElementById(‘timerDisplay’);if(d)d.textContent=fmt(timerSeconds);if(timerSeconds===0){stopTimer();if(navigator.vibrate)navigator.vibrate([200,100,200]);const b=document.getElementById(‘timerSS’);if(b)b.textContent=‘▶ Başlat’;}}},1000);}
}

}
function attachListEvents(el,data){
el.querySelectorAll(’.shop-check’).forEach(chk=>{chk.addEventListener(‘click’,()=>{const item=data.alisveris.find(i=>i.id===chk.dataset.id);if(item){item.checked=!item.checked;Store.save(data);el.querySelector(’#shopList’).innerHTML=renderList(data);attachListEvents(el,data);}});});
el.querySelectorAll(’.eitm’).forEach(btn=>{btn.addEventListener(‘click’,e=>{e.stopPropagation();const item=data.alisveris.find(i=>i.id===btn.dataset.id);if(item)openItemModal(data,item);});});
}
function openItemModal(data,existing){
const isEdit=!!existing;
const item=existing||{id:Store.uid(),ad:’’,miktar:’’,kategori:‘Market’,checked:false};
Modal.open(isEdit?‘Ürünü Düzenle’:‘Ürün Ekle’,` <div class="form-group"><label class="form-label">Ürün Adı</label><input class="form-input" id="s_ad" value="${item.ad}" placeholder="Yoğurt, Tavuk..."></div> <div class="form-row"> <div class="form-group"><label class="form-label">Miktar</label><input class="form-input" id="s_mik" value="${item.miktar}" placeholder="2 kg, 1 adet..."></div> <div class="form-group"><label class="form-label">Kategori</label><select class="form-select" id="s_kat">${['Market','Manav','Et & Balık','Süt & Kahvaltılık','İçecek','Temizlik','Diğer'].map(c=>`<option ${item.kategori===c?‘selected’:’’}>${c}</option>`).join('')}</select></div> </div> <div style="display:flex;gap:8px"> <button class="btn btn-accent" style="flex:1" id="saveItem">${isEdit?'Güncelle':'Ekle'}</button> ${isEdit?'<button class="btn btn-danger" id="delItem">Sil</button>':''} </div>`);
Modal.getBody().querySelector(’#saveItem’).addEventListener(‘click’,()=>{
const ad=document.getElementById(‘s_ad’).value.trim();
if(!ad){alert(‘Ürün adı zorunlu!’);return;}
item.ad=ad;item.miktar=document.getElementById(‘s_mik’).value;item.kategori=document.getElementById(‘s_kat’).value;
if(isEdit){const idx=data.alisveris.findIndex(i=>i.id===item.id);if(idx!==-1)data.alisveris[idx]=item;}
else data.alisveris.push(item);
Store.save(data);render(data);Modal.close();
});
Modal.getBody().querySelector(’#delItem’)?.addEventListener(‘click’,()=>{data.alisveris=data.alisveris.filter(i=>i.id!==item.id);Store.save(data);render(data);Modal.close();});
}
return{render};
})();

// ==================== APP ====================
document.addEventListener(‘DOMContentLoaded’,()=>{
let data=Store.load();
Theme.init(data.settings?.theme||‘auto’);
renderAll();
document.querySelectorAll(’.nav-btn’).forEach(btn=>{
btn.addEventListener(‘click’,()=>{
document.querySelectorAll(’.nav-btn’).forEach(b=>b.classList.remove(‘active’));
btn.classList.add(‘active’);
document.querySelectorAll(’.page’).forEach(p=>p.classList.remove(‘active’));
document.getElementById(‘page-’+btn.dataset.page).classList.add(‘active’);
});
});
document.getElementById(‘themeToggle’).addEventListener(‘click’,()=>{
const t=Theme.toggle();if(!data.settings)data.settings={};data.settings.theme=t;Store.save(data);
});
document.getElementById(‘exportBtn’).addEventListener(‘click’,()=>Store.exportJSON(data));
document.getElementById(‘importBtn’).addEventListener(‘click’,()=>document.getElementById(‘importFile’).click());
document.getElementById(‘importFile’).addEventListener(‘change’,e=>{
const file=e.target.files[0];if(!file)return;
Store.importJSON(file,(err,parsed)=>{
if(err){alert(‘Hata: ‘+err.message);return;}
if(confirm(‘Mevcut veriler silinecek ve yedek yüklenecek. Devam edilsin mi?’)){data=parsed;Store.save(data);renderAll();alert(‘✅ Yedek başarıyla yüklendi!’);}
});
e.target.value=’’;
});
function renderAll(){data=Store.load();PageGenel.render(data);PageSpor.render(data);PageTarifler.render(data);PageAlisveris.render(data);}
});
</script>

</body>
</html>
