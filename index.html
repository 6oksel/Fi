<!DOCTYPE html>
<html lang="tr" data-theme="auto">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>FitApp - İlerleme Takibi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
:root{--bg:#f5f4f0;--bg2:#ebe9e3;--surface:#fff;--surface2:#f0eee9;--border:#d8d5cd;--text:#1a1917;--text2:#6b6860;--accent:#e8501a;--accent-bg:#fde8e0;--green:#2d8a4e;--green-bg:#e0f5e9;--blue:#1a6fb5;--blue-bg:#ddeeff;--yellow:#c47d00;--yellow-bg:#fff3d0;--purple:#7c3aed;--purple-bg:#ede9fe;--red:#e53935;--radius:16px;--font-title:'Syne',sans-serif;--font-body:'DM Sans',sans-serif}
[data-theme="dark"]{--bg:#121210;--bg2:#1c1c1a;--surface:#1c1c1a;--surface2:#262624;--border:#33312e;--text:#f5f4f0;--text2:#a8a59e;--accent-bg:#3d1a0d;--green-bg:#0d2d1a;--blue-bg:#0a2a45;--yellow-bg:#332100;--purple-bg:#241145}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:100px;transition:background 0.3s}
.container{max-width:500px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.header h1{font-family:var(--font-title);font-weight:800;font-size:28px;letter-spacing:-0.5px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-title{font-family:var(--font-title);font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text2)}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);font-family:inherit;font-size:15px;outline:none;transition:border-color 0.2s}
input:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;border:none;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-icon{width:40px;height:40px;padding:0;border-radius:10px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.nav-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:460px;background:rgba(var(--surface),0.8);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:24px;display:flex;justify-content:space-around;padding:12px;box-shadow:0 10px 30px rgba(0,0,0,0.1);z-index:1000}
.nav-btn{background:none;border:none;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1;transition:0.2s}
.nav-btn i{font-size:24px}
.nav-btn span{font-size:10px;font-weight:600}
.nav-btn.active{color:var(--accent)}
.page{display:none}
.page.active{display:block}
.stat-lbl{font-size:11px;color:var(--text2)}
.stat-val{display:block;font-size:18px;font-weight:700;color:var(--accent)}
.foto-card {position: relative; overflow: hidden; border-radius: 12px; aspect-ratio: 1/1; background: var(--surface2);}
.foto-card img {width: 100%; height: 100%; object-fit: cover;}
.foto-delete {position: absolute; top: 5px; right: 5px; background: rgba(229, 57, 53, 0.8); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold;}
.vucut-log {display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border);}
.vucut-log:last-child {border-bottom: none;}
</style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>FitApp</h1>
        <div style="display:flex;gap:8px">
            <button class="btn btn-outline btn-icon" id="themeToggle"><i class="ph-bold ph-moon"></i></button>
            <button class="btn btn-outline btn-icon" id="exportBtn"><i class="ph-bold ph-download-simple"></i></button>
            <button class="btn btn-outline btn-icon" id="importBtn"><i class="ph-bold ph-upload-simple"></i></button>
            <input type="file" id="importFile" style="display:none" accept=".json"/>
        </div>
    </header>

    <section id="page-genel" class="page active">
        <div class="card">
            <h2 class="card-title"><i class="ph-bold ph-house"></i> Merhaba 👋</h2>
            <p style="color:var(--text2)">Bugün hedeflerine ulaşmak için harika bir gün. Takipte kal!</p>
        </div>
        <div class="grid-2">
            <div class="card">
                <div class="stat-lbl">Günlük Kalori</div>
                <div class="stat-val" id="summary-cal">0 kcal</div>
            </div>
            <div class="card">
                <div class="stat-lbl">Son Kilo</div>
                <div class="stat-val" id="summary-weight">-</div>
            </div>
        </div>
    </section>

    <section id="page-antrenman" class="page">
        <div class="card">
            <h2 class="card-title">Antrenman Ekle</h2>
            <input type="text" id="w_title" placeholder="Egzersiz" style="margin-bottom:10px">
            <div class="grid-2">
                <input type="number" id="w_sets" placeholder="Set">
                <input type="number" id="w_reps" placeholder="Tekrar">
            </div>
            <button class="btn btn-primary" onclick="PageAntrenman.add()" style="width:100%;margin-top:12px">Ekle</button>
        </div>
        <div id="workout-list"></div>
    </section>

    <section id="page-beslenme" class="page">
        <div class="card">
            <h2 class="card-title">Kalori Takibi</h2>
            <input type="text" id="c_name" placeholder="Yemek" style="margin-bottom:10px">
            <input type="number" id="c_val" placeholder="Kalori">
            <button class="btn btn-primary" onclick="PageKalori.add()" style="width:100%; margin-top:12px">Kaydet</button>
        </div>
        <div id="calorie-list"></div>
    </section>

    <section id="page-vucut" class="page">
        <div class="card">
            <h2 class="card-title">Vücut Analizi</h2>
            <div class="input-group">
                <label>Kilo (kg)</label>
                <input type="number" id="v_kilo" step="0.1" placeholder="75.5">
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>Yağ Oranı (%)</label>
                    <input type="number" id="v_yag" step="0.1" placeholder="15">
                </div>
                <div class="input-group">
                    <label>Bel (cm)</label>
                    <input type="number" id="v_bel" step="0.1" placeholder="85">
                </div>
            </div>
            <button class="btn btn-primary" onclick="PageVucut.save()" style="width:100%">Kaydet</button>
        </div>
        <div id="vucut-history"></div>
    </section>

    <section id="page-fotograflar" class="page">
        <div class="card">
            <h2 class="card-title">İlerleme Fotoğrafları</h2>
            <input type="file" id="foto-input" accept="image/*" style="display:none">
            <button class="btn btn-primary" onclick="document.getElementById('foto-input').click()" style="width:100%">
                <i class="ph-bold ph-plus"></i> Fotoğraf Yükle
            </button>
        </div>
        <div id="foto-grid" class="grid-2"></div>
    </section>
</div>

<nav class="nav-bar">
    <button class="nav-btn active" data-page="genel"><i class="ph-bold ph-house"></i><span>Genel</span></button>
    <button class="nav-btn" data-page="antrenman"><i class="ph-bold ph-barbell"></i><span>Antrenman</span></button>
    <button class="nav-btn" data-page="beslenme"><i class="ph-bold ph-fork-knife"></i><span>Beslenme</span></button>
    <button class="nav-btn" data-page="vucut"><i class="ph-bold ph-chart-line"></i><span>Vücut</span></button>
    <button class="nav-btn" data-page="fotograflar"><i class="ph-bold ph-camera"></i><span>Foto</span></button>
</nav>

<script>
const Store = {
  load: () => JSON.parse(localStorage.getItem('fitapp_data')) || { workouts:[], calories:[], vucut:[], fotos:[] },
  save: (d) => localStorage.setItem('fitapp_data', JSON.stringify(d)),
  exportJSON: (d) => {
    const blob = new Blob([JSON.stringify(d)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'fitapp_backup.json';
    a.click();
  },
  importJSON: (file, cb) => {
    const reader = new FileReader();
    reader.onload = (e) => { try { cb(null, JSON.parse(e.target.result)); } catch(err) { cb(err); } };
    reader.readAsText(file);
  }
};

const Theme = {
  init: (t) => { document.documentElement.setAttribute('data-theme', t); },
  toggle: () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    return next;
  }
};

const PageGenel = {
  render: (data) => {
    document.getElementById('summary-cal').innerText = (data.calories || []).reduce((s,i)=>s+Number(i.val),0) + ' kcal';
    const last = (data.vucut || [])[data.vucut.length - 1];
    document.getElementById('summary-weight').innerText = last ? last.kilo + ' kg' : '-';
  }
};

const PageAntrenman = {
  render: (data) => {
    document.getElementById('workout-list').innerHTML = (data.workouts || []).map(w => `
      <div class="card" style="display:flex;justify-content:space-between;align-items:center">
        <div><strong>${w.title}</strong><br><small>${w.sets} x ${w.reps}</small></div>
        <button class="btn-icon" style="color:var(--red)" onclick="PageAntrenman.delete('${w.id}')"><i class="ph-bold ph-trash"></i></button>
      </div>`).join('');
  },
  add: () => {
    const t = document.getElementById('w_title').value;
    const s = document.getElementById('w_sets').value;
    const r = document.getElementById('w_reps').value;
    if(!t) return;
    const d = Store.load(); d.workouts.push({id:Date.now().toString(), title:t, sets:s, reps:r});
    Store.save(d); renderAll(); document.getElementById('w_title').value='';
  },
  delete: (id) => {
    const d = Store.load(); d.workouts = d.workouts.filter(w=>w.id!==id);
    Store.save(d); renderAll();
  }
};

const PageKalori = {
  render: (data) => {
    document.getElementById('calorie-list').innerHTML = (data.calories || []).map(c => `
      <div class="card" style="display:flex;justify-content:space-between;align-items:center">
        <div><strong>${c.name}</strong><br><small>${c.val} kcal</small></div>
        <button class="btn-icon" style="color:var(--red)" onclick="PageKalori.delete('${c.id}')"><i class="ph-bold ph-trash"></i></button>
      </div>`).join('');
  },
  add: () => {
    const n = document.getElementById('c_name').value;
    const v = document.getElementById('c_val').value;
    if(!n || !v) return;
    const d = Store.load(); d.calories.push({id:Date.now().toString(), name:n, val:v});
    Store.save(d); renderAll(); document.getElementById('c_name').value=''; document.getElementById('c_val').value='';
  },
  delete: (id) => {
    const d = Store.load(); d.calories = d.calories.filter(c=>c.id!==id);
    Store.save(d); renderAll();
  }
};

const PageVucut = {
  render: (data) => {
    document.getElementById('vucut-history').innerHTML = (data.vucut || []).slice().reverse().map(v => `
      <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center">
        <div><strong>${v.kilo} kg</strong> <small>${v.date}</small><br><span style="font-size:12px; color:var(--text2)">%${v.yag} Yağ | ${v.bel} cm Bel</span></div>
        <button class="btn-icon" style="color:var(--red)" onclick="PageVucut.delete('${v.id}')"><i class="ph-bold ph-trash"></i></button>
      </div>`).join('');
  },
  save: () => {
    const k = document.getElementById('v_kilo').value;
    const y = document.getElementById('v_yag').value;
    const b = document.getElementById('v_bel').value;
    if(!k) return;
    const d = Store.load(); if(!d.vucut) d.vucut = [];
    d.vucut.push({id:Date.now().toString(), date:new Date().toLocaleDateString('tr-TR'), kilo:k, yag:y, bel:b});
    Store.save(d); renderAll(); alert('Kaydedildi!');
  },
  delete: (id) => {
    const d = Store.load(); d.vucut = d.vucut.filter(v=>v.id!==id);
    Store.save(d); renderAll();
  }
};

const PageFotograf = {
  render: (data) => {
    document.getElementById('foto-grid').innerHTML = (data.fotos || []).slice().reverse().map(f => `
      <div class="foto-card">
        <img src="${f.src}">
        <button class="foto-delete" onclick="PageFotograf.delete('${f.id}')">×</button>
        <div style="position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.5);color:#fff;font-size:9px;text-align:center;padding:2px">${f.date}</div>
      </div>`).join('');
  },
  add: (base64) => {
    const d = Store.load(); if(!d.fotos) d.fotos = [];
    d.fotos.push({id:Date.now().toString(), src:base64, date:new Date().toLocaleDateString('tr-TR')});
    Store.save(d); renderAll();
  },
  delete: (id) => {
    if(confirm('Silinsin mi?')) {
      const d = Store.load(); d.fotos = d.fotos.filter(f=>f.id!==id);
      Store.save(d); renderAll();
    }
  }
};

function renderAll() {
  const data = Store.load();
  PageGenel.render(data);
  PageAntrenman.render(data);
  PageKalori.render(data);
  PageVucut.render(data);
  PageFotograf.render(data);
}

document.addEventListener('DOMContentLoaded', () => {
  renderAll();
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + btn.dataset.page).classList.add('active');
    });
  });
  document.getElementById('foto-input').addEventListener('change', (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader(); reader.onloadend = () => PageFotograf.add(reader.result);
    reader.readAsDataURL(file);
  });
  document.getElementById('themeToggle').addEventListener('click', () => {
    const t = Theme.toggle();
    let d = Store.load(); if(!d.settings) d.settings = {}; d.settings.theme = t; Store.save(d);
  });
  document.getElementById('exportBtn').addEventListener('click', () => Store.exportJSON(Store.load()));
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files[0]; if(!file) return;
    Store.importJSON(file, (err, parsed) => {
      if(!err && confirm('Veriler yüklensin mi?')) { Store.save(parsed); location.reload(); }
    });
  });
});
</script>
</body>
</html>
