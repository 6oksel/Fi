<!DOCTYPE html>
<html lang="tr" data-theme="auto">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>FitApp - Gelişmiş Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f5f4f0;--bg2:#ebe9e3;--surface:#fff;--surface2:#f0eee9;--border:#d8d5cd;--text:#1a1917;--text2:#6b6860;--accent:#e8501a;--accent-bg:#fde8e0;--green:#2d8a4e;--green-bg:#e0f5e9;--blue:#1a6fb5;--blue-bg:#ddeeff;--yellow:#c47d00;--yellow-bg:#fff3d0;--purple:#7c3aed;--purple-bg:#ede9fe;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14);--radius:16px;--radius-sm:10px;--nav-h:72px;--header-h:56px;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--transition:.2s ease}
[data-theme=dark]{--bg:#111210;--bg2:#1a1917;--surface:#222220;--surface2:#2a2927;--border:#3a3835;--text:#f0ede8;--text2:#8a8780;--accent:#ff6a35;--accent-bg:#3a1a0e;--green:#3dba68;--green-bg:#0e2e1a;--blue:#4a9ee0;--blue-bg:#0e2035;--yellow:#f0a830;--yellow-bg:#2a1e00;--purple:#a78bfa;--purple-bg:#2e1065;--shadow:0 2px 12px rgba(0,0,0,.4);--shadow-lg:0 8px 32px rgba(0,0,0,.6)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;background:var(--bg)}
@media(min-width:768px){body{background:var(--bg2)}#app{margin:24px auto;height:calc(100dvh - 48px);border-radius:28px;overflow:hidden;box-shadow:var(--shadow-lg)}}
.app-header{display:flex;align-items:center;justify-content:space-between;height:var(--header-h);padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.app-logo{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-.5px}
.header-right{display:flex;gap:4px}
.page-container{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px 16px calc(16px + var(--nav-h));opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity var(--transition),transform var(--transition);-webkit-overflow-scrolling:touch}
.page.active{opacity:1;pointer-events:all;transform:translateY(0)}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:var(--nav-h);display:flex;background:var(--surface);border-top:1px solid var(--border);z-index:10;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text2);transition:color var(--transition);padding:8px 4px}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-family:var(--font-body);font-size:11px;font-weight:500}
.section-title{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin:20px 0 10px}
.card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);border:none;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:var(--transition);text-decoration:none}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-full{width:100%}
.icon-btn{background:var(--surface2);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:12px;font-weight:600}
.badge-accent{background:var(--accent-bg);color:var(--accent)}

/* SU SAYACI STİLLERİ */
.water-card{background:linear-gradient(135deg,var(--blue),#4facfe);color:#fff;padding:20px;border-radius:var(--radius);text-align:center;margin-bottom:12px;box-shadow:var(--shadow)}
.water-controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:10px}
.water-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.water-btn:active{transform:scale(.9);background:rgba(255,255,255,.3)}

/* PROFIL FOTOĞRAFLARI STİLLERİ */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0}
.photo-box{background:var(--bg2);border:2px dashed var(--border);border-radius:var(--radius-sm);aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer}
.photo-box img{width:100%;height:100%;object-fit:cover}
.photo-label{font-size:10px;font-weight:800;color:var(--text2);margin-top:6px;letter-spacing:0.05em}

/* FORM & DİĞER */
.form-group{margin-bottom:14px;text-align:left}
.form-label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text2)}
.form-input{width:100%;padding:12px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);transition: opacity 0.2s}
.modal-overlay.hidden{display:none; opacity: 0}
.modal-box{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;padding:24px;animation:slideUp .3s cubic-bezier(0,0,0.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.bmr-banner{background:linear-gradient(135deg,var(--accent),var(--yellow));border-radius:var(--radius);padding:16px;color:#fff;margin-bottom:12px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mt-12{margin-top:12px}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-left"><span class="app-logo">⚡ FitApp</span></div>
    <div class="header-right">
      <button id="themeToggle" class="icon-btn">🌓</button>
      <button id="exportBtn" class="icon-btn" title="Yedek Al">⬆️</button>
      <button id="importBtn" class="icon-btn" title="Yedek Yükle">⬇️</button>
      <input type="file" id="importFile" accept=".json" style="display:none"/>
    </div>
  </header>
  <main class="page-container">
    <div id="page-genel" class="page active"></div>
    <div id="page-spor" class="page"><div class="section-title">Spor Programı</div><div class="card">Spor takip özelliği yakında!</div></div>
    <div id="page-tarifler" class="page"><div class="section-title">Sağlıklı Tarifler</div><div class="card">Tarif arşivi yakında!</div></div>
    <div id="page-alisveris" class="page"><div class="section-title">Alışveriş Listesi</div><div class="card">Liste özelliği yakında!</div></div>
  </main>
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="genel"><span class="nav-icon">🏠</span><span class="nav-label">Genel</span></button>
    <button class="nav-btn" data-page="spor"><span class="nav-icon">💪</span><span class="nav-label">Spor</span></button>
    <button class="nav-btn" data-page="tarifler"><span class="nav-icon">🍽️</span><span class="nav-label">Tarifler</span></button>
    <button class="nav-btn" data-page="alisveris"><span class="nav-icon">🛒</span><span class="nav-label">Market</span></button>
  </nav>
</div>

<div id="modalOverlay" class="modal-overlay hidden">
  <div id="modalBox" class="modal-box">
    <div class="modal-header"><h3 id="modalTitle" style="font-family:var(--font-display)"></h3><button id="modalClose" class="icon-btn">✕</button></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const Store = (() => {
  const KEY = 'fitapp_pro_data';
  const def = {
    macros: { kalori: 2000, protein: 150, karbonhidrat: 200, yag: 60 },
    profil: { ad: '', kilo: '', boy: '', yas: '', cinsiyet: 'Erkek', fotoIlk: null, fotoSon: null },
    suTakibi: {},
    settings: { theme: 'auto' }
  };
  return {
    load: () => JSON.parse(localStorage.getItem(KEY)) || JSON.parse(JSON.stringify(def)),
    save: (d) => localStorage.setItem(KEY, JSON.stringify(d)),
    today: () => new Date().toLocaleDateString('tr-TR'),
    exportJSON: (d) => {
      const blob = new Blob([JSON.stringify(d)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download=`fitapp_yedek_${Date.now()}.json`; a.click();
    },
    importJSON: (file, cb) => {
      const reader = new FileReader();
      reader.onload = (e) => { try{cb(null, JSON.parse(e.target.result))}catch(err){cb(err)} };
      reader.readAsText(file);
    }
  };
})();

const Theme = {
  init: (t) => document.documentElement.setAttribute('data-theme', t),
  toggle: () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    return next;
  }
};

const Modal = {
  open: (title, html) => {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modalOverlay').classList.remove('hidden');
  },
  close: () => document.getElementById('modalOverlay').classList.add('hidden')
};

const PageGenel = {
  render: (data) => {
    const el = document.getElementById('page-genel');
    const bugun = Store.today();
    const p = data.profil;
    const bugunSu = data.suTakibi[bugun] || 0;

    el.innerHTML = `
      <div class="flex-between">
        <div>
          <div style="font-family:var(--font-display);font-size:22px;font-weight:800;line-height:1.2">
            ${p.ad ? 'Hoş geldin,<br>'+p.ad+'! 👋' : 'Hoş geldin! 👋'}
          </div>
          <div style="color:var(--text2);font-size:13px;margin-top:4px">${bugun}</div>
        </div>
        <button class="btn btn-outline btn-sm" id="editProfilBtn">✏️ Profil</button>
      </div>

      <div class="bmr-banner mt-12">
        <div style="font-size:12px;opacity:.8;font-weight:700;text-transform:uppercase">HEDEF KALORİ</div>
        <div style="font-size:28px;font-weight:800">${data.macros.kalori} kcal</div>
      </div>

      <!-- SU SAYACI -->
      <div class="water-card">
        <div style="font-size:12px;opacity:.9;font-weight:700">💧 GÜNLÜK SU TÜKETİMİ</div>
        <div style="font-size:34px;font-weight:800;margin:6px 0">${bugunSu} <span style="font-size:16px;font-weight:400">Bardak</span></div>
        <div class="water-controls">
          <button class="water-btn" id="decWater">−</button>
          <div style="font-size:24px">🥛</div>
          <button class="water-btn" id="incWater">+</button>
        </div>
      </div>

      <!-- GELİŞİM FOTOĞRAFLARI -->
      <div class="section-title">Gelişim Takibi</div>
      <div class="photo-grid">
        <div class="photo-box">
          ${p.fotoIlk ? `<img src="${p.fotoIlk}">` : '<span style="font-size:24px">📸</span>'}
          <div class="photo-label">İLK HALİ</div>
        </div>
        <div class="photo-box">
          ${p.fotoSon ? `<img src="${p.fotoSon}">` : '<span style="font-size:24px">📸</span>'}
          <div class="photo-label">SON HALİ</div>
        </div>
      </div>

      <div class="section-title">Hızlı Özet</div>
      <div class="card">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
           <div>
              <div style="font-size:11px;color:var(--text2)">Protein</div>
              <div style="font-size:18px;font-weight:700;color:var(--blue)">${data.macros.protein}g</div>
           </div>
           <div>
              <div style="font-size:11px;color:var(--text2)">Yağ</div>
              <div style="font-size:18px;font-weight:700;color:var(--green)">${data.macros.yag}g</div>
           </div>
        </div>
      </div>
    `;

    // Events
    el.querySelector('#editProfilBtn').onclick = () => openProfil(data);
    el.querySelector('#incWater').onclick = () => {
      data.suTakibi[bugun] = (data.suTakibi[bugun] || 0) + 1;
      Store.save(data); PageGenel.render(data);
    };
    el.querySelector('#decWater').onclick = () => {
      if(data.suTakibi[bugun] > 0) {
        data.suTakibi[bugun]--;
        Store.save(data); PageGenel.render(data);
      }
    };
  }
};

function openProfil(data) {
  const p = data.profil;
  Modal.open('Profil Ayarları', `
    <div class="form-group">
      <label class="form-label">Adınız</label>
      <input type="text" id="pAd" class="form-input" value="${p.ad || ''}" placeholder="İsim Girin">
    </div>
    
    <div class="section-title" style="margin-top:20px">Fotoğraflarını Güncelle</div>
    <div class="photo-grid">
      <div class="photo-box" onclick="document.getElementById('fIlk').click()">
        ${p.fotoIlk ? `<img src="${p.fotoIlk}">` : '<span>➕</span>'}
        <div class="photo-label">İLK HALİ</div>
        <input type="file" id="fIlk" hidden accept="image/*">
      </div>
      <div class="photo-box" onclick="document.getElementById('fSon').click()">
        ${p.fotoSon ? `<img src="${p.fotoSon}">` : '<span>➕</span>'}
        <div class="photo-label">SON HALİ</div>
        <input type="file" id="fSon" hidden accept="image/*">
      </div>
    </div>
    <p style="font-size:11px;color:var(--text2);margin-bottom:15px">Not: Fotoğraflar cihazınızda saklanır.</p>
    
    <button class="btn btn-accent btn-full" id="saveProfil">Değişiklikleri Kaydet</button>
  `);

  // Fotoğraf Yükleme Fonksiyonu
  const setupPhoto = (inputId, key) => {
    document.getElementById(inputId).onchange = (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (re) => {
        data.profil[key] = re.target.result; // Base64 sakla
        Store.save(data);
        openProfil(data); // Modalı yenile
      };
      reader.readAsDataURL(file);
    };
  };
  setupPhoto('fIlk', 'fotoIlk');
  setupPhoto('fSon', 'fotoSon');

  document.getElementById('saveProfil').onclick = () => {
    data.profil.ad = document.getElementById('pAd').value;
    Store.save(data);
    Modal.close();
    PageGenel.render(data);
  };
}

document.addEventListener('DOMContentLoaded', () => {
  let data = Store.load();
  Theme.init(data.settings?.theme || 'auto');
  
  // İlk Render
  PageGenel.render(data);

  // Navigasyon
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + btn.dataset.page).classList.add('active');
    };
  });

  document.getElementById('themeToggle').onclick = () => {
    const t = Theme.toggle();
    if(!data.settings) data.settings = {};
    data.settings.theme = t;
    Store.save(data);
  };

  document.getElementById('modalClose').onclick = () => Modal.close();
  
  document.getElementById('exportBtn').onclick = () => Store.exportJSON(data);
  document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
  document.getElementById('importFile').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    Store.importJSON(file, (err, parsed) => {
      if(err) return alert('Hata: Geçersiz dosya!');
      data = parsed; Store.save(data); location.reload();
    });
  };
});
</script>
</body>
</html>
